<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TANK COMMANDER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #wrapper {
      position: relative;
      border: 2px solid #00ff44;
      box-shadow: 0 0 30px #00ff4466, 0 0 80px #00ff4422;
    }
    canvas { display: block; image-rendering: pixelated; }
    #scanlines {
      position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 3px,
        rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px
      );
    }
    #hint {
      color: #00aa33; font-size: 11px; margin-top: 8px;
      letter-spacing: 1px; opacity: 0.6;
    }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="scanlines"></div>
</div>
<div id="hint">MOVE: ARROWS/WASD &nbsp;|&nbsp; AIM: MOUSE &nbsp;|&nbsp; SHOOT: SPACE &nbsp;|&nbsp; ENTER=START &nbsp;|&nbsp; U=SHOP &nbsp;|&nbsp; ESC=MENU</div>

<script>
// ═══════════════════════════════════════════════
//  TANK COMMANDER  —  Retro 2D Tank Shooter v2
// ═══════════════════════════════════════════════

const W = 800, H = 580;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// ── Audio ─────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function sfx(type) {
  try {
    const t = AC.currentTime;
    if (type === 'shoot') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(520, t);
      o.frequency.exponentialRampToValueAtTime(90, t + 0.07);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      o.start(t); o.stop(t + 0.07);
    } else if (type === 'boom') {
      const sz = AC.sampleRate * 0.22 | 0;
      const buf = AC.createBuffer(1, sz, AC.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const s = AC.createBufferSource(), g = AC.createGain();
      s.buffer = buf; s.connect(g); g.connect(AC.destination);
      g.gain.setValueAtTime(0.45, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      s.start(t); s.stop(t + 0.22);
    } else if (type === 'hurt') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(260, t);
      o.frequency.exponentialRampToValueAtTime(40, t + 0.3);
      g.gain.setValueAtTime(0.35, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    } else if (type === 'hit') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(300, t);
      o.frequency.exponentialRampToValueAtTime(150, t + 0.05);
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      o.start(t); o.stop(t + 0.05);
    } else if (type === 'levelup') {
      [0, 0.1, 0.2, 0.32].forEach((d, i) => {
        const freqs = [350, 450, 570, 760];
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(AC.destination);
        o.type = 'square';
        o.frequency.value = freqs[i];
        g.gain.setValueAtTime(0.18, t + d);
        g.gain.exponentialRampToValueAtTime(0.001, t + d + 0.1);
        o.start(t + d); o.stop(t + d + 0.12);
      });
    } else if (type === 'boss') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(80, t);
      o.frequency.linearRampToValueAtTime(35, t + 0.7);
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      o.start(t); o.stop(t + 0.7);
      const o2 = AC.createOscillator(), g2 = AC.createGain();
      o2.connect(g2); g2.connect(AC.destination);
      o2.type = 'square';
      o2.frequency.setValueAtTime(440, t + 0.15);
      o2.frequency.setValueAtTime(330, t + 0.35);
      o2.frequency.setValueAtTime(440, t + 0.55);
      g2.gain.setValueAtTime(0.2, t + 0.15);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
      o2.start(t + 0.15); o2.stop(t + 0.75);
    } else if (type === 'buy') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(440, t);
      o.frequency.setValueAtTime(660, t + 0.08);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o.start(t); o.stop(t + 0.2);
    } else if (type === 'powerup') {
      [0, 0.07, 0.14, 0.22].forEach((d, i) => {
        const freqs = [500, 650, 800, 1050];
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(AC.destination);
        o.type = 'square';
        o.frequency.value = freqs[i];
        g.gain.setValueAtTime(0.22, t + d);
        g.gain.exponentialRampToValueAtTime(0.001, t + d + 0.1);
        o.start(t + d); o.stop(t + d + 0.12);
      });
    }
  } catch (e) {}
}

// ── Input ─────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
  if (e.code === 'Enter')  onEnter();
  if (e.code === 'Escape') onEscape();
  if (e.code === 'KeyU' && state === 'menu') state = 'shop';
  if (state === 'shop') {
    if (e.code === 'ArrowUp')   shopSel = (shopSel + SHOP_ITEMS.length - 1) % SHOP_ITEMS.length;
    if (e.code === 'ArrowDown') shopSel = (shopSel + 1) % SHOP_ITEMS.length;
  }
  if (AC.state === 'suspended') AC.resume();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Mouse aim ────────────────────────────────
const mouse = { x: W / 2, y: 0 };
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
});

// ── State ─────────────────────────────────────
let state = 'menu';   // menu | playing | shop | gameover
let score = 0, hiScore = 0, lives = 3, level = 1;
let frame = 0, shakeFrames = 0, shakeAmt = 0;
let coins = 0;        // persists across games
let bossAlert = 0;    // countdown for boss entrance animation
let shopSel = 0;      // selected shop item index
let powerups = [];    // dropped power-up items on field
let activePU = null;  // { type, timer } — currently active power-up

const PU_DURATION = 600; // 10 seconds at 60 fps
const PU_TYPES    = ['shield', 'invis', 'bloodhound'];
const PU_COLS     = { shield: '#4488ff', invis: '#cc44ff', bloodhound: '#ff4422' };
const PU_LABELS   = { shield: 'SHIELD', invis: 'INVISIBLE', bloodhound: 'BLOODHOUND' };

// ── Upgrade System ────────────────────────────
const upgrades = { speed: 0, fireRate: 0, bulletSpd: 0, lives: 0 };
const SHOP_ITEMS = [
  { key: 'speed',     label: 'MOVE SPEED',    desc: '+0.5 speed per rank',   cost: 100, max: 5 },
  { key: 'fireRate',  label: 'FIRE RATE',     desc: '-2 cooldown per rank',  cost: 100, max: 5 },
  { key: 'bulletSpd', label: 'BULLET SPEED',  desc: '+1.5 spd per rank',    cost: 100, max: 5 },
  { key: 'lives',     label: 'EXTRA LIFE',    desc: '+1 starting life',      cost: 150, max: 3 },
];

// ── Player ────────────────────────────────────
const PL = {
  x: W / 2, y: H - 80,
  w: 36, h: 32,
  spd: 4,
  cd: 0, cdMax: 16,
  inv: 0,
};

// ── Collections ───────────────────────────────
let bullets = [], eBullets = [], enemies = [], particles = [], popups = [], stars = [];

// Background stars
for (let i = 0; i < 110; i++) {
  stars.push({ x: rnd(0, W), y: rnd(0, H), r: Math.random() < 0.6 ? 1 : 2,
               b: 0.15 + Math.random() * 0.75, vy: 0.08 + Math.random() * 0.28 });
}

// ── Enemy Definitions ─────────────────────────
const EDEFS = {
  basic: { w:34, h:30, hp:2, spd:1.3, pts:100, col:'#cc2222', tcol:'#ff4444', fRate:150, pat:'down' },
  scout: { w:26, h:22, hp:1, spd:2.9, pts:200, col:'#bb9900', tcol:'#ffdd22', fRate:999999, pat:'zz'   },
  heavy: { w:44, h:38, hp:5, spd:0.7, pts:300, col:'#bb5500', tcol:'#ff8833', fRate:80,  pat:'down' },
};

// ── Helpers ───────────────────────────────────
function rnd(a, b) { return a + Math.random() * (b - a); }
function pad(n, l) { return String(n).padStart(l, '0'); }
function hits(ax, ay, aw, ah, bx, by, bw, bh) {
  return Math.abs(ax - bx) < (aw + bw) * 0.5 && Math.abs(ay - by) < (ah + bh) * 0.5;
}

// ── Color helpers ─────────────────────────────
function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, ((n >> 16) & 255) * (1 - amt) | 0);
  const g = Math.max(0, ((n >>  8) & 255) * (1 - amt) | 0);
  const b = Math.max(0, ( n        & 255) * (1 - amt) | 0);
  return `rgb(${r},${g},${b})`;
}
function tint(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (((n >> 16) & 255) + (255 - ((n >> 16) & 255)) * amt) | 0);
  const g = Math.min(255, (((n >>  8) & 255) + (255 - ((n >>  8) & 255)) * amt) | 0);
  const b = Math.min(255, (( n        & 255) + (255 - ( n        & 255)) * amt) | 0);
  return `rgb(${r},${g},${b})`;
}

// ── Tank Drawing ──────────────────────────────
// aimAngle: world angle for player turret (mouse aim). Omit for enemies.
function drawTank(cx, cy, w, h, bodyCol, turretCol, facingUp, aimAngle) {
  ctx.save();
  ctx.translate(cx | 0, cy | 0);

  // ── Body (hull + tracks) ──────────────────
  ctx.save();
  if (!facingUp) ctx.rotate(Math.PI);
  {
    const hw = w * 0.5, hh = h * 0.5, tw = w * 0.15;
    ctx.fillStyle = shade(bodyCol, 0.5);
    ctx.fillRect(-hw,      -hh + h * 0.08, tw, h * 0.84);
    ctx.fillRect(hw - tw,  -hh + h * 0.08, tw, h * 0.84);
    ctx.fillStyle = shade(bodyCol, 0.65);
    for (let i = 0; i < 5; i++) {
      const ty = -hh + h * 0.08 + i * (h * 0.84 / 5) + 1;
      ctx.fillRect(-hw,     ty, tw, 2);
      ctx.fillRect(hw - tw, ty, tw, 2);
    }
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-hw + tw, -hh + h * 0.18, w - tw * 2, h * 0.62);
    ctx.fillStyle = tint(bodyCol, 0.3);
    ctx.fillRect(-hw + tw + 2, -hh + h * 0.18 + 2, (w - tw * 2) * 0.45, 3);
  }
  ctx.restore();

  // ── Turret + Barrel (independent rotation) ─
  ctx.save();
  // aimAngle=0 means right; default barrel points up=-PI/2, so offset by +PI/2
  const ta = aimAngle !== undefined
    ? aimAngle + Math.PI / 2
    : (!facingUp ? Math.PI : 0);
  ctx.rotate(ta);
  {
    const hw = w * 0.5, hh = h * 0.5;
    ctx.fillStyle = turretCol;
    ctx.fillRect(-w * 0.21, -hh - h * 0.04, w * 0.42, h * 0.42);
    ctx.fillStyle = tint(turretCol, 0.25);
    ctx.fillRect(-w * 0.21 + 2, -hh - h * 0.04 + 2, w * 0.18, 2);
    ctx.fillStyle = shade(turretCol, 0.3);
    ctx.fillRect(-w * 0.085, -hh - h * 0.04 - h * 0.38, w * 0.17, h * 0.4);
    ctx.fillStyle = shade(turretCol, 0.5);
    ctx.fillRect(-w * 0.085, -hh - h * 0.04 - h * 0.38, w * 0.17, 3);
  }
  ctx.restore();

  ctx.restore();
}

// ── Spawn enemy ───────────────────────────────
let spawnTimer = 0;
function spawnEnemy() {
  const pool = ['basic', 'basic', 'basic', 'scout', 'scout'];
  if (level >= 2) pool.push('heavy');
  if (level >= 3) pool.push('scout', 'heavy');
  if (level >= 5) pool.push('heavy', 'heavy');

  const key = pool[Math.floor(Math.random() * pool.length)];
  const d = EDEFS[key];
  enemies.push({
    key, x: rnd(d.w / 2 + 12, W - d.w / 2 - 12), y: -d.h,
    w: d.w, h: d.h,
    hp: d.hp, maxHp: d.hp,
    spd: d.spd + (level - 1) * 0.09,
    pts: d.pts, col: d.col, tcol: d.tcol,
    pat: d.pat,
    fc: Math.floor(rnd(0, d.fRate)),
    fr: Math.max(42, d.fRate - level * 6),
    zzd: Math.random() < 0.5 ? 1 : -1,
    zzt: 0,
  });

  if (key === 'heavy') {
    bossAlert = 150;
    shakeFrames = 14; shakeAmt = 5;
    sfx('boss');
  }
}

// ── Fire bullet toward mouse ──────────────────
function fireBullet() {
  if (PL.cd > 0) return;
  if (activePU && activePU.type === 'shield') return; // can't attack while shielded
  const dx = mouse.x - PL.x;
  const dy = mouse.y - PL.y;
  const len = Math.hypot(dx, dy) || 1;
  const bspd = 10 + upgrades.bulletSpd * 1.5;
  const dmg  = (activePU && activePU.type === 'bloodhound') ? 2 : 1;
  bullets.push({
    x: PL.x + (dx / len) * (PL.h * 0.6),
    y: PL.y + (dy / len) * (PL.h * 0.6),
    vx: (dx / len) * bspd,
    vy: (dy / len) * bspd,
    w: 5, h: 5, dmg,
  });
  PL.cd = PL.cdMax;
  sfx('shoot');
}

// ── Burst particles ───────────────────────────
function burst(x, y, col, n = 14) {
  for (let i = 0; i < n; i++) {
    const a = rnd(0, Math.PI * 2), sp = rnd(1.5, 5);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: rnd(20, 50) | 0, maxLife: 50,
      sz: rnd(2, 5), col,
    });
  }
}

function popup(x, y, txt, col = '#ffee00') {
  popups.push({ x, y, t: txt, col, life: 70, vy: -0.9 });
}

// ── Update ────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frame++;
  if (shakeFrames > 0) shakeFrames--;
  if (bossAlert  > 0) bossAlert--;

  // Spawn timing
  const si = Math.max(32, 105 - level * 8);
  if (++spawnTimer >= si) { spawnTimer = 0; spawnEnemy(); }

  // Level progression
  const nl = Math.floor(score / 1000) + 1;
  if (nl > level) {
    level = nl;
    coins += 100;
    sfx('levelup');
    popup(W / 2, H / 2 - 40, `LEVEL ${level}!`,  '#00ff88');
    popup(W / 2, H / 2,      '+100 COINS',        '#ffcc00');
  }

  // ── Player ──
  if (PL.cd  > 0) PL.cd--;
  if (PL.inv > 0) PL.inv--;

  // ── Active power-up countdown ──
  if (activePU) {
    activePU.timer--;
    if (activePU.timer <= 0) activePU = null;
  }

  // ── Collect power-ups ──
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.timer--;
    if (pu.timer <= 0) { powerups.splice(i, 1); continue; }
    if (hits(pu.x, pu.y, 20, 20, PL.x, PL.y, PL.w, PL.h)) {
      activePU = { type: pu.type, timer: PU_DURATION };
      powerups.splice(i, 1);
      sfx('powerup');
      popup(PL.x, PL.y - 40, PU_LABELS[pu.type] + '!', PU_COLS[pu.type]);
    }
  }

  const spdMult = (activePU && activePU.type !== 'shield') ? 2 : 1;
  const spd = PL.spd * spdMult;
  if ((keys.ArrowLeft  || keys.KeyA) && PL.x - PL.w / 2 > 2)        PL.x -= spd;
  if ((keys.ArrowRight || keys.KeyD) && PL.x + PL.w / 2 < W - 2)    PL.x += spd;
  if ((keys.ArrowUp    || keys.KeyW) && PL.y - PL.h / 2 > H * 0.46) PL.y -= spd;
  if ((keys.ArrowDown  || keys.KeyS) && PL.y + PL.h / 2 < H - 18)   PL.y += spd;

  if (keys.Space || keys.KeyZ) fireBullet();

  // ── Bullets (player) — vx/vy directional ──
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20)
      bullets.splice(i, 1);
  }

  // ── Bullets (enemy) — vx/vy directional ──
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const eb = eBullets[i];
    eb.x += eb.vx; eb.y += eb.vy;
    if (eb.x < -20 || eb.x > W + 20 || eb.y < -20 || eb.y > H + 20)
      eBullets.splice(i, 1);
  }

  // ── Enemies ──
  // Homing strength per type: how strongly they steer toward player x
  const HOMING = { basic: 0.018, scout: 0.038, heavy: 0.010 };
  const invisible = activePU && activePU.type === 'invis';
  for (const e of enemies) {
    e.y += e.spd;

    // Kamikaze homing — disabled when player is invisible
    if (!invisible) {
      const hdx = (PL.x - e.x) * HOMING[e.key];
      e.x += Math.max(-e.spd * 2, Math.min(e.spd * 2, hdx));
    }
    e.x = Math.max(e.w / 2 + 4, Math.min(W - e.w / 2 - 4, e.x));

    // Scouts also zigzag on top of homing
    if (e.pat === 'zz') {
      if (++e.zzt > 40) { e.zzd *= -1; e.zzt = 0; }
      e.x += e.zzd * e.spd * 0.8;
      e.x = Math.max(e.w / 2 + 4, Math.min(W - e.w / 2 - 4, e.x));
    }

    // Fire — shoot straight down when player is invisible, aimed when visible
    if (e.fc > 0) { e.fc--; }
    else {
      const bspd = 2.8 + level * 0.18;
      const fdx = invisible ? 0        : PL.x - e.x;
      const fdy = invisible ? bspd     : PL.y - e.y;
      const flen = Math.hypot(fdx, fdy) || 1;
      eBullets.push({
        x: e.x, y: e.y + e.h / 2 + 4,
        vx: (fdx / flen) * bspd, vy: (fdy / flen) * bspd,
        w: 5, h: 5,
      });
      e.fc = e.fr;
    }

    // Loop back from bottom — never truly leaves
    if (e.y > H + e.h) {
      e.y  = -e.h - rnd(0, 80);
      e.x  = rnd(e.w / 2 + 12, W - e.w / 2 - 12);
      e.hp = e.maxHp;
      e.fc = Math.floor(rnd(0, e.fr));
    }
  }

  // ── Bullet → Enemy ──
  outer:
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (hits(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        bullets.splice(bi, 1);
        e.hp -= b.dmg || 1;
        if (e.hp <= 0) {
          score += e.pts;
          popup(e.x, e.y, '+' + e.pts);
          burst(e.x, e.y, e.col, 18);
          sfx('boom');
          shakeFrames = 9; shakeAmt = 4;
          // Drop random power-up when heavy boss is killed
          if (e.key === 'heavy') {
            const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
            powerups.push({ x: e.x, y: e.y, type, timer: 420 }); // 7 sec to collect
          }
          // Respawn at top instead of deleting
          e.y  = -e.h - rnd(20, 120);
          e.x  = rnd(e.w / 2 + 12, W - e.w / 2 - 12);
          e.hp = e.maxHp;
          e.fc = Math.floor(rnd(0, e.fr));
        } else {
          burst(e.x, e.y, '#fff', 5);
          sfx('hit');
        }
        continue outer;
      }
    }
  }

  // ── Enemy bullet → Player ──
  const shielded = activePU && activePU.type === 'shield';
  const tanky    = activePU && activePU.type === 'bloodhound';
  if (PL.inv === 0 && !shielded) {
    for (let i = eBullets.length - 1; i >= 0; i--) {
      if (hits(eBullets[i].x, eBullets[i].y, eBullets[i].w, eBullets[i].h,
               PL.x, PL.y, PL.w, PL.h)) {
        eBullets.splice(i, 1);
        takeDamage(tanky ? 0.5 : 1);
        break;
      }
    }
    for (const e of enemies) {
      if (hits(e.x, e.y, e.w, e.h, PL.x, PL.y, PL.w, PL.h)) {
        burst(e.x, e.y, e.col, 12); sfx('boom');
        e.y  = -e.h - rnd(20, 120);
        e.x  = rnd(e.w / 2 + 12, W - e.w / 2 - 12);
        e.hp = e.maxHp;
        const ramDmg = tanky ? 0.25 : 0.5;
        takeDamage(ramDmg);
        popup(PL.x, PL.y - 30, tanky ? '-¼ LIFE' : '-½ LIFE', '#ff4444');
        break;
      }
    }
  }

  // ── Stars ──
  for (const s of stars) { s.y += s.vy; if (s.y > H) { s.y = 0; s.x = rnd(0, W); } }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    if (--p.life <= 0) particles.splice(i, 1);
  }

  // ── Popups ──
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].y += popups[i].vy;
    if (--popups[i].life <= 0) popups.splice(i, 1);
  }
}

function takeDamage(amount = 1) {
  lives -= amount;
  PL.inv = 110;
  shakeFrames = amount >= 1 ? 20 : 10; shakeAmt = amount >= 1 ? 7 : 4;
  burst(PL.x, PL.y, '#00ff88', amount >= 1 ? 24 : 12);
  sfx('hurt');
  if (lives <= 0) { if (score > hiScore) hiScore = score; state = 'gameover'; }
}

// ── Render ────────────────────────────────────
function render() {
  ctx.save();

  // Screen shake
  if (shakeFrames > 0) {
    const s = shakeAmt * (shakeFrames / 14);
    ctx.translate(rnd(-s, s) | 0, rnd(-s, s) | 0);
  }

  // Background
  ctx.fillStyle = '#030c12';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${s.b})`;
    ctx.fillRect(s.x | 0, s.y | 0, s.r, s.r);
  }

  if      (state === 'menu')     drawMenu();
  else if (state === 'shop')     drawShop();
  else if (state === 'playing')  { drawPlay(); if (bossAlert > 0) drawBossAlert(); }
  else if (state === 'gameover') { drawPlay(); drawGameOver(); }

  ctx.restore();
}

// ── Draw: Gameplay ────────────────────────────
function drawPlay() {
  // Ground strip
  ctx.fillStyle = '#061a08';
  ctx.fillRect(0, H - 16, W, 16);
  ctx.fillStyle = '#0b2f10';
  ctx.fillRect(0, H - 16, W, 2);

  // ── Enemy bullets (rotated to direction) ──
  ctx.shadowBlur = 10; ctx.shadowColor = '#ff4400';
  ctx.fillStyle  = '#ff6600';
  for (const b of eBullets) {
    ctx.save();
    ctx.translate(b.x | 0, b.y | 0);
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillRect(-8, -2, 16, 4);
    ctx.restore();
  }
  ctx.shadowBlur = 0;

  // ── Player bullets (rotated to direction) ──
  ctx.shadowBlur = 14; ctx.shadowColor = '#00ccff';
  ctx.fillStyle  = '#55ffff';
  for (const b of bullets) {
    ctx.save();
    ctx.translate(b.x | 0, b.y | 0);
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillRect(-8, -2, 16, 4);
    ctx.restore();
  }
  ctx.shadowBlur = 0;

  // ── Enemies + HP bars for ALL ──
  for (const e of enemies) {
    if (e.key === 'heavy' && bossAlert > 0) {
      ctx.shadowBlur = 18 + (frame % 12); ctx.shadowColor = '#ff5500';
    }
    const eAim = Math.atan2(PL.y - e.y, PL.x - e.x);
    drawTank(e.x, e.y, e.w, e.h, e.col, e.tcol, false, eAim);
    ctx.shadowBlur = 0;
    // HP bar — every enemy
    const bw = e.w + 6;
    const bx = (e.x - bw / 2) | 0, by = (e.y - e.h / 2 - 10) | 0;
    const pct = e.hp / e.maxHp;
    ctx.fillStyle = '#222'; ctx.fillRect(bx, by, bw, 5);
    ctx.fillStyle = pct > 0.6 ? '#44ff44' : pct > 0.3 ? '#ffbb00' : '#ff3300';
    ctx.fillRect(bx, by, (bw * pct) | 0, 5);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, 5);
  }

  // ── Power-up drops ──
  for (const pu of powerups) {
    const pulse = 0.7 + 0.3 * Math.sin(frame * 0.12);
    ctx.shadowBlur  = 16 * pulse; ctx.shadowColor = PU_COLS[pu.type];
    ctx.fillStyle   = PU_COLS[pu.type];
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(pu.x | 0, pu.y | 0, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.fillStyle   = '#fff';
    ctx.font        = 'bold 10px "Courier New"';
    ctx.textAlign   = 'center';
    const icon = { shield: 'S', invis: 'I', bloodhound: 'B' }[pu.type];
    ctx.fillText(icon, pu.x | 0, (pu.y + 4) | 0);
    // Fading timer ring
    ctx.strokeStyle = PU_COLS[pu.type];
    ctx.lineWidth   = 2;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(pu.x | 0, pu.y | 0, 15, -Math.PI / 2,
            -Math.PI / 2 + Math.PI * 2 * (pu.timer / 420));
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── Player (mouse-aimed turret, blinks when invincible) ──
  const aimAngle = Math.atan2(mouse.y - PL.y, mouse.x - PL.x);
  if (PL.inv === 0 || (frame >> 2) & 1) {
    // Power-up glow on player
    if (activePU) {
      const pc = PU_COLS[activePU.type];
      ctx.shadowBlur  = 22 + 8 * Math.sin(frame * 0.15);
      ctx.shadowColor = pc;
      if (activePU.type === 'invis') ctx.globalAlpha = 0.35;
    }
    drawTank(PL.x, PL.y, PL.w, PL.h, '#00cc66', '#00ffaa', true, aimAngle);
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
    ctx.fillStyle   = 'rgba(0,255,80,0.12)';
    ctx.beginPath();
    ctx.ellipse(PL.x | 0, (PL.y + PL.h / 2) | 0, PL.w * 0.55, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Particles ──
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle   = p.col;
    ctx.fillRect((p.x - p.sz / 2) | 0, (p.y - p.sz / 2) | 0, p.sz | 0, p.sz | 0);
  }
  ctx.globalAlpha = 1;

  // ── Score popups ──
  ctx.font = 'bold 14px "Courier New"';
  ctx.textAlign = 'center';
  for (const p of popups) {
    ctx.globalAlpha = p.life / 70;
    ctx.fillStyle   = p.col;
    ctx.fillText(p.t, p.x | 0, p.y | 0);
  }
  ctx.globalAlpha = 1;

  drawHUD();
}

// ── HUD ───────────────────────────────────────
function drawHUD() {
  // Bar
  ctx.fillStyle = '#000e00';
  ctx.fillRect(0, 0, W, 36);
  ctx.strokeStyle = '#00cc44';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, W - 1, 35);

  ctx.font = 'bold 14px "Courier New"';

  ctx.fillStyle   = '#00ff55';
  ctx.textAlign   = 'left';
  ctx.fillText(`SCORE ${pad(score, 6)}`, 14, 23);
  ctx.fillStyle   = '#ffcc00';
  ctx.font        = '13px "Courier New"';
  ctx.fillText(`\u2B21 ${coins}`, 178, 23);

  ctx.fillStyle   = '#88ee88';
  ctx.textAlign   = 'center';
  ctx.font        = '12px "Courier New"';
  ctx.fillText(`HI ${pad(hiScore, 6)}`, W / 2, 19);
  ctx.fillStyle   = '#334433';
  ctx.font        = '10px "Courier New"';
  ctx.fillText('[ESC] MENU  [U] SHOP', W / 2, 31);

  // Active power-up bar (bottom-center)
  if (activePU) {
    const pc  = PU_COLS[activePU.type];
    const pct = activePU.timer / PU_DURATION;
    const bx  = (W / 2 - 80) | 0, by = H - 28;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(bx - 2, by - 2, 164, 20);
    ctx.fillStyle = pc;
    ctx.fillRect(bx, by, (160 * pct) | 0, 16);
    ctx.strokeStyle = pc; ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, 160, 16);
    ctx.shadowBlur  = 8; ctx.shadowColor = pc;
    ctx.fillStyle   = '#fff';
    ctx.font        = 'bold 11px "Courier New"';
    ctx.textAlign   = 'center';
    ctx.fillText(PU_LABELS[activePU.type], W / 2, by + 12);
    ctx.shadowBlur  = 0;
  }

  ctx.fillStyle   = '#00ff55';
  ctx.font        = 'bold 14px "Courier New"';
  ctx.textAlign   = 'right';
  ctx.fillText(`LV ${level}`, W - 140, 23);

  const maxLives = 3 + upgrades.lives;
  for (let i = 0; i < maxLives; i++) {
    const full = lives >= i + 1;
    const half = !full && lives >= i + 0.5;
    ctx.globalAlpha = full ? 1 : half ? 0.6 : 0.18;
    const tx = W - 128 + i * 34, ty = 5;
    ctx.fillStyle = half ? '#ffaa00' : '#00ff88'; ctx.fillRect(tx,     ty + 7, 22, 10);
    ctx.fillStyle = half ? '#cc8800' : '#00cc66'; ctx.fillRect(tx + 4, ty + 3, 14, 7);
    ctx.fillStyle = half ? '#995500' : '#008844'; ctx.fillRect(tx + 9, ty,      4, 5);
  }
  ctx.globalAlpha = 1;
}

// ── Menu ──────────────────────────────────────
function drawMenu() {
  // Title
  ctx.shadowBlur  = 28; ctx.shadowColor = '#00ff44';
  ctx.fillStyle   = '#00ff44';
  ctx.font        = 'bold 66px "Courier New"';
  ctx.textAlign   = 'center';
  ctx.fillText('TANK', W / 2, H / 2 - 90);
  ctx.fillText('COMMANDER', W / 2, H / 2 - 14);
  ctx.shadowBlur  = 0;

  ctx.fillStyle   = '#339933';
  ctx.font        = '14px "Courier New"';
  ctx.fillText('★  RETRO ARCADE TANK BATTLE  ★', W / 2, H / 2 + 30);

  ctx.fillStyle   = '#226622';
  ctx.font        = '13px "Courier New"';
  ctx.fillText('MOVE: ARROWS/WASD   AIM: MOUSE   SHOOT: SPACE', W / 2, H / 2 + 62);

  ctx.fillStyle = '#ffcc00';
  ctx.font      = 'bold 15px "Courier New"';
  ctx.fillText(`\u2B21 COINS: ${coins}`, W / 2, H / 2 + 88);

  // Blink
  if ((frame >> 4) & 1) {
    ctx.fillStyle   = '#ccffcc';
    ctx.font        = 'bold 18px "Courier New"';
    ctx.fillText('[ ENTER ]  START GAME', W / 2, H / 2 + 118);
  }
  ctx.fillStyle = '#aacc66';
  ctx.font      = 'bold 14px "Courier New"';
  ctx.fillText('[ U ]  UPGRADE SHOP', W / 2, H / 2 + 144);

  // Enemy showcase
  const showcase = [
    { key: 'basic', lbl: 'BASIC  100 PTS', x: W / 2 - 240 },
    { key: 'scout', lbl: 'SCOUT  200 PTS', x: W / 2       },
    { key: 'heavy', lbl: 'HEAVY  300 PTS', x: W / 2 + 240 },
  ];
  ctx.font = '11px "Courier New"';
  for (const e of showcase) {
    const d = EDEFS[e.key];
    drawTank(e.x, H - 62, d.w, d.h, d.col, d.tcol, false);
    ctx.fillStyle = '#446644';
    ctx.textAlign = 'center';
    ctx.fillText(e.lbl, e.x, H - 28);
  }
  // Player tank in showcase
  drawTank(W / 2, H - 62, 36, 32, '#00cc66', '#00ffaa', true);
  ctx.fillStyle = '#446644';
  ctx.font      = '11px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('YOU', W / 2, H - 28);
}

// ── Boss Alert Overlay ────────────────────────
function drawBossAlert() {
  const t = bossAlert / 150;
  if ((frame >> 2) & 1) {
    ctx.fillStyle = `rgba(200,20,0,${0.14 * t})`;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.fillStyle = `rgba(0,0,0,${0.78 * t})`;
  ctx.fillRect(0, H / 2 - 42, W, 84);
  ctx.strokeStyle = `rgba(255,70,0,${t})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(12, H / 2 - 42, W - 24, 84);
  const pulse = (frame % 10 < 5) ? 2 : 0;
  ctx.shadowBlur  = 22 * t; ctx.shadowColor = '#ff3300';
  ctx.fillStyle   = `rgba(255,90,0,${t})`;
  ctx.font        = `bold ${26 + pulse}px "Courier New"`;
  ctx.textAlign   = 'center';
  ctx.fillText('\u26A0  HEAVY TANK INCOMING  \u26A0', W / 2, H / 2 + 10);
  ctx.shadowBlur  = 0;
}

// ── Upgrade Shop ──────────────────────────────
function drawShop() {
  ctx.fillStyle = 'rgba(0,8,3,0.97)';
  ctx.fillRect(100, 50, W - 200, H - 100);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 2;
  ctx.strokeRect(100, 50, W - 200, H - 100);

  ctx.shadowBlur = 14; ctx.shadowColor = '#00ff44';
  ctx.fillStyle  = '#00ff44';
  ctx.font       = 'bold 26px "Courier New"';
  ctx.textAlign  = 'center';
  ctx.fillText('UPGRADE SHOP', W / 2, 94);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffcc00';
  ctx.font      = 'bold 15px "Courier New"';
  ctx.fillText(`\u2B21 COINS: ${coins}`, W / 2, 120);

  SHOP_ITEMS.forEach((item, i) => {
    const iy     = 148 + i * 76;
    const sel    = i === shopSel;
    const lv     = upgrades[item.key];
    const maxed  = lv >= item.max;
    const canBuy = !maxed && coins >= item.cost;

    ctx.fillStyle   = sel ? 'rgba(0,255,80,0.1)' : 'rgba(0,0,0,0.4)';
    ctx.fillRect(116, iy, W - 232, 66);
    ctx.strokeStyle = sel ? '#00ff88' : '#223322';
    ctx.lineWidth   = sel ? 2 : 1;
    ctx.strokeRect(116, iy, W - 232, 66);

    if (sel) {
      ctx.fillStyle = '#00ff88'; ctx.font = 'bold 16px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('\u25B6', 124, iy + 38);
    }

    ctx.fillStyle = maxed ? '#446644' : canBuy ? '#ccffcc' : '#776644';
    ctx.font      = 'bold 14px "Courier New"';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, 148, iy + 24);
    ctx.fillStyle = '#446644'; ctx.font = '11px "Courier New"';
    ctx.fillText(item.desc, 148, iy + 44);

    // Rank pips
    for (let p = 0; p < item.max; p++) {
      ctx.fillStyle = p < lv ? '#00ff88' : '#1a331a';
      ctx.fillRect(W / 2 - 10 + p * 20, iy + 26, 16, 16);
    }

    ctx.textAlign = 'right';
    if (maxed) {
      ctx.fillStyle = '#446644'; ctx.font = 'bold 12px "Courier New"';
      ctx.fillText('MAXED', W - 120, iy + 38);
    } else {
      ctx.fillStyle = canBuy ? '#ffcc00' : '#664422';
      ctx.font = 'bold 14px "Courier New"';
      ctx.fillText(`\u2B21 ${item.cost}`, W - 120, iy + 38);
    }
  });

  ctx.fillStyle = '#336633'; ctx.font = '12px "Courier New"'; ctx.textAlign = 'center';
  ctx.fillText('\u2191\u2193 NAVIGATE    ENTER = BUY    ESC = BACK', W / 2, H - 66);
}

// ── Game Over ─────────────────────────────────
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowBlur  = 22; ctx.shadowColor = '#ff1111';
  ctx.fillStyle   = '#ff3333';
  ctx.font        = 'bold 62px "Courier New"';
  ctx.textAlign   = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 52);
  ctx.shadowBlur  = 0;

  ctx.fillStyle   = '#ffee00';
  ctx.font        = 'bold 24px "Courier New"';
  ctx.fillText(`SCORE: ${pad(score, 6)}`, W / 2, H / 2 + 18);

  if (score > 0 && score >= hiScore) {
    ctx.fillStyle = '#ff9900';
    ctx.font      = 'bold 16px "Courier New"';
    ctx.fillText('** NEW HIGH SCORE **', W / 2, H / 2 + 54);
  }

  if ((frame >> 4) & 1) {
    ctx.fillStyle = '#ccffcc';
    ctx.font      = 'bold 17px "Courier New"';
    ctx.fillText('PRESS ENTER TO PLAY AGAIN', W / 2, H / 2 + 104);
  }
}

// ── Game control ──────────────────────────────
function onEnter() {
  if      (state === 'menu')     startGame();
  else if (state === 'gameover') startGame();
  else if (state === 'shop')     buyUpgrade();
}

function onEscape() {
  if (state === 'playing' || state === 'shop' || state === 'gameover')
    state = 'menu';
}

function buyUpgrade() {
  const item = SHOP_ITEMS[shopSel];
  if (upgrades[item.key] >= item.max || coins < item.cost) return;
  coins -= item.cost;
  upgrades[item.key]++;
  sfx('buy');
}

function startGame() {
  score = 0; level = 1; frame = 0;
  shakeFrames = 0; spawnTimer = 0; bossAlert = 0;
  bullets = []; eBullets = []; enemies = []; particles = []; popups = [];
  powerups = []; activePU = null;
  PL.x    = W / 2; PL.y = H - 80;
  PL.spd  = 4 + upgrades.speed    * 0.5;
  PL.cdMax = Math.max(6, 16 - upgrades.fireRate * 2);
  PL.cd   = 0; PL.inv = 60;
  lives   = 3 + upgrades.lives;   // coins intentionally NOT reset
  state   = 'playing';
  if (AC.state === 'suspended') AC.resume();
}

// ── Game Loop ─────────────────────────────────
(function loop() {
  update();
  render();
  requestAnimationFrame(loop);
})();
</script>
